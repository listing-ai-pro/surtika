            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background: linear-gradient(135deg, theme('colors.primary'), theme('colors.primary-container'));

</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Ambient Glow Effects -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50vw] h-[50vw] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[10%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-7xl mx-auto flex flex-col lg:flex-row h-screen lg:h-[921px] lg:max-h-[900px] lg:rounded-xl overflow-hidden bg-surface-container-low shadow-[0px_24px_48px_rgba(0,0,0,0.5)]">
<!-- Left Side: Visuals & Brand -->
<section class="hidden lg:flex w-1/2 relative bg-surface-dim overflow-hidden p-12 flex-col justify-between">
<!-- Brand -->
<div class="z-20">
<h1 class="font-headline font-black italic text-3xl tracking-tighter text-primary">Surtika</h1>
</div>
<!-- Content -->
<div class="z-20 max-w-md">
<h2 class="font-headline text-5xl font-extrabold tracking-tighter leading-tight mb-4">
                    Join the <span class="text-primary">Drop.</span>
</h2>
<p class="font-body text-on-surface-variant text-lg">
                    Exclusive access to rare finds, fast drops, and Gen-Z culture. Welcome to the new era of commerce.
                </p>
</div>
<!-- Image/Visual -->
<div class="absolute inset-0 z-10 opacity-30">
<img alt="Fashion Visual" class="w-full h-full object-cover" data-alt="High contrast fashion photography of a model in cyberpunk inspired streetwear against a dark moody background with neon green edge lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKm1mDcSSv7PoeRxQYRyOTE4pvN-bZPpXwAbE5_K8UKa77Lgy05Di8BkWxa4KZKzE-4Gz5Y44x7cPl6fo9uFEiBSXfAMBR_Kb5U2qckfntkxbEzXuM_1WDwnsr590g10TaeUKKtjYdPOf9IFySPku5EgZTp3314zJG8VOEst6YgmXtb5Tjg2-P2ds_wHrPVt9XEjJM5oDokpuXe0T0EC5I0TqZDpTGZja7Stp4vMWjd8WM2LxBBrjfNwf2hdnE6vTBAFMaZgevZN1R"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-surface-dim"></div>
</div>
</section>
<!-- Right Side: Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative z-20">
<!-- Glassmorphism Card -->
<div class="w-full max-w-md bg-surface-variant/40 backdrop-blur-2xl rounded-xl p-8 sm:p-10 border border-outline-variant/15 shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<div class="lg:hidden mb-8 text-center">
<h1 class="font-headline font-black italic text-3xl tracking-tighter text-primary">Surtika</h1>
</div>
<div class="mb-10 text-center sm:text-left">
<h2 class="font-headline text-3xl font-bold tracking-tight mb-2">
                        Create your <span class="text-primary">account.</span>
</h2>
<p class="font-body text-on-surface-variant text-sm">Join the ecosystem.</p>
</div>
<!-- Error Banner -->
<div id="signup-error" class="hidden mb-4 px-4 py-3 rounded-lg bg-error-container/80 text-on-error-container text-sm font-body"></div>
<form id="signup-form" class="space-y-6">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- First Name -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant" for="firstName">First Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="person">person</span>
<input class="w-full bg-surface-container-high border-b border-outline-variant text-on-surface placeholder:text-on-surface-variant/40 rounded-t-lg pl-12 pr-4 py-3 focus:outline-none focus:border-primary focus:ring-0 transition-colors bg-opacity-50" id="firstName" name="firstName" placeholder="Priya" type="text" required/>
</div>
</div>
<!-- Last Name -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant" for="lastName">Last Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="person">person</span>
<input class="w-full bg-surface-container-high border-b border-outline-variant text-on-surface placeholder:text-on-surface-variant/40 rounded-t-lg pl-12 pr-4 py-3 focus:outline-none focus:border-primary focus:ring-0 transition-colors bg-opacity-50" id="lastName" name="lastName" placeholder="Sharma" type="text" required/>
</div>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-high border-b border-outline-variant text-on-surface placeholder:text-on-surface-variant/40 rounded-t-lg pl-12 pr-4 py-3 focus:outline-none focus:border-primary focus:ring-0 transition-colors bg-opacity-50" id="email" name="email" placeholder="you@example.com" type="email" required/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-b border-outline-variant text-on-surface placeholder:text-on-surface-variant/40 rounded-t-lg pl-12 pr-12 py-3 focus:outline-none focus:border-primary focus:ring-0 transition-colors bg-opacity-50" id="password" name="password" placeholder="••••••••" type="password" required/>
</div>
<!-- Strength Indicator -->
<div class="mt-2 flex gap-1 h-1 w-full">
<div class="strength-bar h-full w-1/3 bg-surface-container-highest rounded-full transition-colors duration-300"></div>
<div class="strength-bar h-full w-1/3 bg-surface-container-highest rounded-full transition-colors duration-300"></div>
<div class="strength-bar h-full w-1/3 bg-surface-container-highest rounded-full transition-colors duration-300"></div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg py-4 rounded-full mt-8 shadow-[0_0_20px_rgba(84,233,138,0.2)] hover:shadow-[0_0_30px_rgba(84,233,138,0.4)] transition-shadow transform hover:scale-[1.02] active:scale-95 duration-200 flex items-center justify-center gap-2" id="signup-btn" type="submit">
    Create Account
    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary hover:text-primary-dim transition-colors font-medium ml-1" href="login.html">Log in</a>
</p>
</div>
</div>
</section>
</main>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    createUserWithEmailAndPassword,
    updateProfile,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import {
    doc, setDoc, getDoc, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const form      = document.getElementById('signup-form');
  const signupBtn = document.getElementById('signup-btn');
  const errBanner = document.getElementById('signup-error');
  const pwInput   = document.getElementById('password');
  const bars      = document.querySelectorAll('.strength-bar');

  pwInput.addEventListener('input', () => {
    const len = pwInput.value.length;
    bars.forEach((b, i) => {
      b.style.background = len > i * 4 ? '#6bfe9c' : '';
    });
  });

  function showError(msg) {
    errBanner.textContent = msg;
    errBanner.classList.remove('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBanner.classList.add('hidden');
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = pwInput.value;
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    signupBtn.textContent = 'Creating…';
    signupBtn.disabled = true;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: `${firstName} ${lastName}` });
      const userRef = doc(db, 'users', cred.user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, {
          uid: cred.user.uid, email,
          displayName: `${firstName} ${lastName}`,
          role: 'customer', savedAddresses: [], orderHistory: [],
          createdAt: serverTimestamp()
        });
      }
      window.location.href = 'index.html';
    } catch (err) {
      showError(err.message);
      signupBtn.textContent = 'Create Account';
      signupBtn.disabled = false;
    }
  });

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'index.html';
  });
</script>
</body></html>
