<script type="module">
  import { auth } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const loginForm = document.getElementById('login-form');
  const loginBtn  = document.getElementById('login-btn');
  const googleBtn = document.getElementById('google-btn');
  const errBanner = document.getElementById('login-error');
  const pwInput   = document.getElementById('password');
  const toggleBtn = document.querySelector('button[type="button"]');
  const gProvider = new GoogleAuthProvider();

  // Password visibility toggle
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const hidden = pwInput.type === 'password';
      pwInput.type = hidden ? 'text' : 'password';
      toggleBtn.querySelector('span').textContent = hidden ? 'visibility' : 'visibility_off';
    });
  }

  function showError(msg) {
    errBanner.textContent = msg;
    errBanner.classList.remove('hidden');
  }

  async function postLogin(user) {
    const token = await user.getIdTokenResult(true);
    window.location.href = token.claims.admin ? 'admin.html' : 'index.html';
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBanner.classList.add('hidden');
    loginBtn.textContent = 'Logging in…';
    loginBtn.disabled = true;
    try {
      const cred = await signInWithEmailAndPassword(
        auth,
        document.getElementById('email').value.trim(),
        pwInput.value
      );
      await postLogin(cred.user);
    } catch (err) {
      showError(err.message);
      loginBtn.textContent = 'Log In';
      loginBtn.disabled = false;
    }
  });

  googleBtn.addEventListener('click', async () => {
    errBanner.classList.add('hidden');
    try {
      const cred = await signInWithPopup(auth, gProvider);
      await postLogin(cred.user);
    } catch (err) { showError(err.message); }
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) await postLogin(user);
  });
</script>
